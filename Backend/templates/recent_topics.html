<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recently Used Topics - GenCode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Vibrant Neon Colors */
            --primary: #6366f1;
            --primary-light: #818cf8;
            --accent-pink: #ec4899;
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --accent-magenta: #d946ef;
            
            /* Light Mode */
            --bg-light: #f8fafc;
            --card-light: #ffffff;
            --text-light: #0f172a;
            --text-muted-light: #64748b;
            --border-light: #e2e8f0;
            
            /* Dark Mode */
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-dark: #f1f5f9;
            --text-muted-dark: #94a3b8;
            --border-dark: #334155;
            
            /* Current Mode */
            --bg: var(--bg-light);
            --card: var(--card-light);
            --text: var(--text-light);
            --text-muted: var(--text-muted-light);
            --border: var(--border-light);
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html.dark {
            --bg: var(--bg-dark);
            --card: var(--card-dark);
            --text: var(--text-dark);
            --text-muted: var(--text-muted-dark);
            --border: var(--border-dark);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: var(--transition);
            min-height: 100vh;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary), var(--accent-purple));
            border-radius: 4px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.25rem;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--accent-blue), var(--primary));
            color: white;
            padding: 2.5rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: slideBackground 20s linear infinite;
        }

        @keyframes slideBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
            position: relative;
            z-index: 1;
        }

        .header-text h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            margin: 0 0 0.25rem 0;
            animation: slideInDown 0.6s ease-out;
        }

        .header-subtitle {
            font-size: 0.95rem;
            opacity: 0.9;
            animation: slideInUp 0.6s ease-out 0.1s backwards;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            animation: slideInUp 0.6s ease-out 0.2s backwards;
        }

        /* Theme Toggle */
        .theme-toggle-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .theme-toggle-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn-light {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }

        .btn-light:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        /* Main Content */
        .main-content {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            animation: slideInUp 0.6s ease-out 0.3s backwards;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .content-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }

        .content-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .content-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            padding: 0.5rem 1rem;
            border-radius: 20px;
        }

        /* Topic List */
        .topic-list {
            list-style: none;
        }

        .topic-item {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            border-left: 4px solid transparent;
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .topic-item:last-child {
            border-bottom: none;
        }

        .topic-item:hover {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.05), transparent);
            transform: translateX(8px);
            border-left-color: var(--accent-pink);
        }

        .topic-info {
            flex: 1;
        }

        .topic-name {
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.25rem;
            font-size: 1.05rem;
        }

        .topic-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .meta-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: var(--border);
            padding: 0.35rem 0.75rem;
            border-radius: 16px;
        }

        .topic-actions {
            display: flex;
            gap: 0.75rem;
            margin-left: 1rem;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            border: none;
            background: var(--border);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .action-btn:hover {
            background: linear-gradient(135deg, var(--accent-cyan), var(--primary));
            color: white;
            transform: scale(1.1);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
        }

        .empty-icon {
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .empty-text {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .difficulty-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: capitalize;
        }

        .difficulty-easy {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .difficulty-medium {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .difficulty-hard {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* Animations */
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .header-text h1 {
                font-size: 1.5rem;
            }

            .topic-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .topic-actions {
                margin-left: 0;
                margin-top: 0.75rem;
                width: 100%;
            }

            .main-content {
                padding: 1.5rem;
            }

            .content-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="header-text">
                    <h1><i class="fas fa-history"></i> Recently Used</h1>
                    <p class="header-subtitle">Continue where you left off</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-light theme-toggle-btn" id="themeToggle" title="Toggle dark mode">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="content-header">
                <div class="content-title">
                    <i class="fas fa-list"></i>
                    Your Recent Topics
                </div>
                <div class="content-meta">
                    <i class="fas fa-clock"></i>
                    <span>Last accessed topics</span>
                </div>
            </div>

            <ul class="topic-list" id="topicList">
                <!-- Topics will be populated here -->
            </ul>

            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon"><i class="fas fa-inbox"></i></div>
                <p class="empty-text">No recently used topics yet. Start practicing to see your history!</p>
            </div>
        </div>
    </main>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        // Initialize theme
        function initTheme() {
            const savedTheme = localStorage.getItem('gencode-theme') || 'light';
            if (savedTheme === 'dark') {
                html.classList.add('dark');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
        }

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('gencode-theme', isDark ? 'dark' : 'light');
            themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });

        // Mock data - Replace with server data
        const recentTopics = {{ topics|tojson }} || [];

        function renderTopics() {
            const topicList = document.getElementById('topicList');
            const emptyState = document.getElementById('emptyState');

            if (recentTopics.length === 0) {
                emptyState.style.display = 'block';
                topicList.innerHTML = '';
                return;
            }

            topicList.innerHTML = recentTopics.map((topic, index) => {
                const difficultyClass = `difficulty-${topic.difficulty || 'medium'}`;
                const timeAgo = formatTimeAgo(topic.last_used);
                
                return `
                    <li class="topic-item" style="animation: slideInUp 0.6s ease-out ${0.1 * (index + 1)}s backwards;">
                        <div class="topic-info">
                            <div class="topic-name">${escapeHtml(topic.name)}</div>
                            <div class="topic-meta">
                                <span class="meta-tag">
                                    <i class="fas fa-folder"></i>
                                    ${escapeHtml(topic.category || 'General')}
                                </span>
                                <span class="meta-tag">
                                    <i class="fas fa-clock"></i>
                                    ${timeAgo}
                                </span>
                                <span class="difficulty-badge ${difficultyClass}">
                                    ${topic.difficulty || 'medium'}
                                </span>
                            </div>
                        </div>
                        <div class="topic-actions">
                            <button class="action-btn" title="View" onclick="viewTopic('${escapeHtml(topic.name)}')">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="action-btn" title="Practice" onclick="practice('${escapeHtml(topic.name)}')">
                                <i class="fas fa-play"></i>
                            </button>
                            <button class="action-btn" title="Share" onclick="shareTopic('${escapeHtml(topic.name)}')">
                                <i class="fas fa-share-alt"></i>
                            </button>
                        </div>
                    </li>
                `;
            }).join('');
        }

        function formatTimeAgo(date) {
            if (!date) return 'Recently';
            const now = new Date();
            const then = new Date(date);
            const seconds = Math.floor((now - then) / 1000);
            
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
            return Math.floor(seconds / 86400) + 'd ago';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function viewTopic(name) {
            alert(`Viewing: ${name}`);
            // Implement navigation
        }

        function practice(name) {
            alert(`Starting practice: ${name}`);
            // Navigate to practice page
            window.location.href = `/practice/${encodeURIComponent(name)}`;
        }

        function shareTopic(name) {
            const url = window.location.origin + `/share/${encodeURIComponent(name)}`;
            navigator.clipboard.writeText(url);
            alert('Share link copied to clipboard!');
        }

        initTheme();
        renderTopics();
    </script>
</body>
</html>
