<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova · Topic Forge</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f2f4f8;
      --card: rgba(255, 255, 255, 0.75);
      --card-border: rgba(255, 255, 255, 0.4);
      --text: #1a1e2c;
      --text-muted: #4a5068;
      --surface: rgba(230, 234, 242, 0.6);
      --shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08);
      --glow: 0 8px 32px rgba(99, 102, 241, 0.15);
      --primary: #5b6af0;
      --primary-soft: #7c8af5;
      --gradient: linear-gradient(145deg, #5b6af0, #a855f7);
      --radius: 28px;
      --radius-sm: 16px;
      --transition: 0.25s cubic-bezier(0.2, 0, 0, 1);
    }

    body.dark {
      --bg: #0e121f;
      --card: rgba(22, 28, 46, 0.85);
      --card-border: rgba(255, 255, 255, 0.06);
      --text: #f0f3fa;
      --text-muted: #98a1c2;
      --surface: rgba(30, 38, 58, 0.7);
      --shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
      --glow: 0 8px 32px rgba(91, 106, 240, 0.2);
    }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
      transition: background 0.3s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
    }

    /* glassmorphism */
    .glass {
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow), var(--glow);
      border-radius: var(--radius);
    }

    .glass-sm {
      background: var(--card);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
    }

    .logo i {
      font-size: 2rem;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.65rem 1.25rem;
      border: none;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
      border: 1px solid transparent;
    }

    .btn i {
      font-size: 1rem;
    }

    .btn-primary {
      background: var(--gradient);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 18px -6px rgba(91, 106, 240, 0.3);
    }

    .btn-primary:hover {
      transform: scale(0.97);
      box-shadow: 0 12px 24px -8px rgba(91, 106, 240, 0.4);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--card-border);
      backdrop-filter: blur(4px);
    }

    .btn-ghost:hover {
      background: var(--surface);
    }

    .btn-icon {
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 60px;
    }

    .theme-toggle {
      background: var(--surface);
      border: 1px solid var(--card-border);
    }

    /* Layout */
    .dashboard {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 1.75rem;
    }

    @media (max-width: 1024px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }

    /* Sidebar */
    .sidebar {
      padding: 1.5rem;
      height: fit-content;
      position: sticky;
      top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 1rem;
      background: var(--surface);
      border-radius: 60px;
      border: 1px solid var(--card-border);
      transition: var(--transition);
    }

    .search-wrap:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(91, 106, 240, 0.15);
    }

    .search-wrap i {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .search-wrap input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      padding: 0.4rem 0;
    }

    .search-wrap input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    .topic-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.25rem 0;
    }

    .topic-stats span {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .topic-stats .count {
      background: var(--gradient);
      color: white;
      border-radius: 60px;
      padding: 0.15rem 0.85rem;
      font-size: 0.8rem;
    }

    .topic-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 460px;
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    .topic-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1rem;
      border-radius: 60px;
      background: transparent;
      transition: var(--transition);
      border: 1px solid transparent;
      cursor: default;
    }

    .topic-item:hover {
      background: var(--surface);
      border-color: var(--card-border);
    }

    .topic-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
      flex-shrink: 0;
    }

    .topic-info {
      flex: 1;
      min-width: 0;
    }

    .topic-name {
      font-weight: 600;
      font-size: 0.9rem;
      line-height: 1.3;
    }

    .topic-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    .topic-meta i {
      font-size: 0.6rem;
    }

    .diff-badge {
      padding: 0.15rem 0.65rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.65rem;
      text-transform: capitalize;
      background: var(--surface);
      border: 1px solid var(--card-border);
    }

    .diff-easy { background: rgba(16, 185, 129, 0.15); color: #10b981; border-color: rgba(16, 185, 129, 0.2); }
    .diff-medium { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border-color: rgba(245, 158, 11, 0.2); }
    .diff-hard { background: rgba(239, 68, 68, 0.15); color: #ef4444; border-color: rgba(239, 68, 68, 0.2); }

    .topic-actions {
      display: flex;
      gap: 0.2rem;
      flex-shrink: 0;
    }

    .topic-actions .btn {
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 60px;
      font-size: 0.7rem;
      background: transparent;
      border: none;
      color: var(--text-muted);
    }

    .topic-actions .btn:hover {
      background: var(--surface);
      color: var(--text);
    }

    .topic-actions .btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    .sidebar-footer {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }

    .sidebar-footer .btn {
      width: 100%;
      justify-content: center;
      font-size: 0.8rem;
      padding: 0.5rem;
    }

    /* Main board */
    .board {
      padding: 2rem;
      min-height: 500px;
      display: flex;
      flex-direction: column;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex: 1;
      gap: 1rem;
      padding: 2rem 1rem;
    }

    .empty-state i {
      font-size: 3.6rem;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 1.4rem;
      font-weight: 600;
    }

    .empty-state p {
      color: var(--text-muted);
      max-width: 400px;
      font-size: 0.95rem;
    }

    /* detail cards */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 2rem;
    }

    @media (max-width: 768px) {
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .detail-header h2 {
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 1rem 0.75rem;
      text-align: center;
      border: 1px solid var(--card-border);
    }

    .stat-card .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .stat-card .value {
      font-size: 1.6rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-wrap {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 1.25rem;
      border: 1px solid var(--card-border);
      margin-bottom: 2rem;
    }

    .progress-wrap .title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }

    .progress-track {
      height: 8px;
      background: var(--bg);
      border-radius: 60px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--gradient);
      border-radius: 60px;
      transition: width 0.4s ease;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    .action-panel {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 1.25rem;
      border: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      height: fit-content;
    }

    .action-panel .panel-title {
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }

    .action-panel .btn {
      width: 100%;
      justify-content: center;
    }

    /* modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 1rem;
    }

    .modal-box {
      max-width: 480px;
      width: 100%;
      padding: 2rem;
      border-radius: var(--radius);
      background: var(--card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow), var(--glow);
    }

    .modal-box h3 {
      font-weight: 700;
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-bottom: 1.2rem;
    }

    .field label {
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--text-muted);
    }

    .field input, .field select {
      padding: 0.8rem 1rem;
      border-radius: 60px;
      border: 1px solid var(--card-border);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: var(--transition);
    }

    .field input:focus, .field select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(91, 106, 240, 0.1);
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    /* scroll */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    /* responsive */
    @media (max-width: 640px) {
      body { padding: 0.75rem; }
      .header { padding: 1rem; }
      .board { padding: 1.25rem; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- Header -->
  <header class="header glass">
    <div class="logo">
      <i class="fas fa-code"></i>
      <span>Forge<span style="font-weight:400;">Topics</span></span>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" id="syncBtn"><i class="fab fa-github"></i> Sync</button>
      <button class="btn btn-primary" id="newTopicBtn"><i class="fas fa-plus"></i> New</button>
      <button class="btn btn-icon theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
    </div>
  </header>

  <!-- Dashboard -->
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar glass">
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input id="q" type="text" placeholder="Filter topics..." />
      </div>

      <div class="topic-stats">
        <span><i class="far fa-list-alt"></i> Topics</span>
        <span class="count" id="topicCount">0</span>
      </div>

      <div class="topic-list" id="topicList"></div>

      <div class="sidebar-footer">
        <button class="btn btn-ghost" id="selectAllBtn"><i class="fas fa-check-double"></i> Select all</button>
        <button class="btn btn-primary" id="bulkAddBtn"><i class="fas fa-plus-circle"></i> Add selected</button>
        <button class="btn" id="bulkRemoveBtn" style="color:#ef4444;"><i class="fas fa-trash-alt"></i> Remove selected</button>
        <button class="btn btn-ghost" id="bulkClearBtn"><i class="fas fa-undo-alt"></i> Clear</button>
      </div>
    </aside>

    <!-- Main Board -->
    <section class="board glass" id="mainBoard">
      <div id="mainView">
        <div class="empty-state">
          <i class="fas fa-compass"></i>
          <h3>Ready to organize</h3>
          <p>Select a topic from the sidebar to see details, or add a new one to get started.</p>
        </div>
      </div>
    </section>
  </div>
</div>

<!-- Modal root -->
<div id="modalRoot" style="display: none;"></div>

<script>
  (function() {
    // ---- THEME ----
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    function initTheme() {
      const saved = localStorage.getItem('nova-theme') || 'light';
      if (saved === 'dark') { html.classList.add('dark'); themeToggle.innerHTML = '<i class="fas fa-sun"></i>'; }
      else { html.classList.remove('dark'); themeToggle.innerHTML = '<i class="fas fa-moon"></i>'; }
    }
    themeToggle.addEventListener('click', ()=>{
      html.classList.toggle('dark');
      const isDark = html.classList.contains('dark');
      localStorage.setItem('nova-theme', isDark ? 'dark' : 'light');
      themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    });
    initTheme();

    // ---- DATA ----
    const initialTopics = {{ topics|tojson }} || [];
    let state = {
      topics: initialTopics.map(t => ({
        name: t.name || 'untitled',
        category: t.category || 'general',
        difficulty: t.difficulty || 'medium'
      })),
      selected: new Set(),
      active: null,
    };

    // ---- DOM ----
    const topicListEl = document.getElementById('topicList');
    const qInput = document.getElementById('q');
    const topicCount = document.getElementById('topicCount');
    const mainView = document.getElementById('mainView');
    const modalRoot = document.getElementById('modalRoot');

    // helpers
    function escape(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function renderList() {
      const q = qInput.value.trim().toLowerCase();
      const filtered = state.topics.filter(t => t.name.toLowerCase().includes(q));
      topicCount.textContent = filtered.length;
      topicListEl.innerHTML = '';
      filtered.forEach(t => {
        const div = document.createElement('div');
        div.className = 'topic-item';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = state.selected.has(t.name);
        cb.addEventListener('change', (e) => {
          if (e.target.checked) state.selected.add(t.name);
          else state.selected.delete(t.name);
        });
        const info = document.createElement('div');
        info.className = 'topic-info';
        info.innerHTML = `
          <div class="topic-name">${escape(t.name)}</div>
          <div class="topic-meta">
            <span><i class="fas fa-tag"></i> ${escape(t.category)}</span>
            <span class="diff-badge diff-${t.difficulty}">${t.difficulty}</span>
          </div>
        `;
        const actions = document.createElement('div');
        actions.className = 'topic-actions';
        actions.innerHTML = `
          <button class="btn" onclick="window.editTopic('${escape(t.name)}')"><i class="fas fa-pen"></i></button>
          <button class="btn btn-danger" onclick="window.deleteTopic('${escape(t.name)}')"><i class="fas fa-trash"></i></button>
        `;
        div.appendChild(cb);
        div.appendChild(info);
        div.appendChild(actions);
        // click on row to show detail (optional)
        div.addEventListener('click', (e) => {
          if (e.target.closest('input') || e.target.closest('.topic-actions')) return;
          showDetail(t.name);
        });
        topicListEl.appendChild(div);
      });
    }

    // ---- DETAIL VIEW ----
    function showDetail(name) {
      const t = state.topics.find(x => x.name === name);
      if (!t) return;
      state.active = name;
      const total = state.topics.length;
      const easy = state.topics.filter(x => x.difficulty === 'easy').length;
      const medium = state.topics.filter(x => x.difficulty === 'medium').length;
      const hard = state.topics.filter(x => x.difficulty === 'hard').length;
      const progress = total ? Math.round((state.topics.filter(x => x.difficulty !== 'hard').length / total) * 100) : 0;

      mainView.innerHTML = `
        <div class="detail-grid">
          <div>
            <div class="detail-header">
              <h2>${escape(t.name)}</h2>
              <span class="diff-badge diff-${t.difficulty}">${t.difficulty}</span>
            </div>
            <div class="stat-grid">
              <div class="stat-card"><div class="label">Total</div><div class="value">${total}</div></div>
              <div class="stat-card"><div class="label">Easy</div><div class="value">${easy}</div></div>
              <div class="stat-card"><div class="label">Medium</div><div class="value">${medium}</div></div>
            </div>
            <div class="progress-wrap">
              <div class="title">Progress (non-hard)</div>
              <div class="progress-track"><div class="progress-fill" style="width:${progress}%;"></div></div>
              <div class="progress-meta"><span>${progress}%</span><span>${total - hard} / ${total}</span></div>
            </div>
            <div style="display:flex; gap:0.75rem; flex-wrap:wrap;">
              <button class="btn btn-primary" onclick="window.editTopic('${escape(t.name)}')"><i class="fas fa-edit"></i> Edit</button>
              <button class="btn" style="color:#ef4444;" onclick="window.deleteTopic('${escape(t.name)}')"><i class="fas fa-trash"></i> Delete</button>
            </div>
          </div>
          <div class="action-panel">
            <div class="panel-title"><i class="fas fa-cog"></i> Quick actions</div>
            <button class="btn btn-ghost" onclick="window.openNewModal()"><i class="fas fa-plus"></i> Add topic</button>
            <button class="btn btn-ghost" id="syncBtn2"><i class="fab fa-github"></i> Sync repo</button>
            <button class="btn btn-ghost" onclick="window.openBulkModal()"><i class="fas fa-layer-group"></i> Bulk add</button>
          </div>
        </div>
      `;
      document.getElementById('syncBtn2')?.addEventListener('click', ()=> openSyncModal());
    }

    // ---- CRUD ----
    function addTopic(topic) {
      state.topics.unshift(topic);
      renderList();
      closeModal();
      showDetail(topic.name);
      // backend
      const fd = new FormData();
      fd.append('new_topic', topic.name);
      fd.append('category', topic.category);
      fd.append('difficulty', topic.difficulty);
      fetch('/add_topic', { method: 'POST', body: fd }).catch(e=>console.warn);
    }

    window.editTopic = function(name) {
      const t = state.topics.find(x => x.name === name);
      if (!t) return;
      showModal(`
        <h3>Edit topic</h3>
        <div class="field"><label>Name</label><input id="e_name" value="${escape(t.name)}" /></div>
        <div class="field"><label>Category</label><input id="e_cat" value="${escape(t.category)}" /></div>
        <div class="field"><label>Difficulty</label>
          <select id="e_diff"><option value="easy" ${t.difficulty==='easy'?'selected':''}>Easy</option><option value="medium" ${t.difficulty==='medium'?'selected':''}>Medium</option><option value="hard" ${t.difficulty==='hard'?'selected':''}>Hard</option></select>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" id="modalUpdateBtn">Save</button>
        </div>
      `);
      document.getElementById('modalUpdateBtn').addEventListener('click', ()=>{
        const newName = document.getElementById('e_name').value.trim();
        if (!newName) return alert('Name required');
        t.name = newName;
        t.category = document.getElementById('e_cat').value.trim() || 'general';
        t.difficulty = document.getElementById('e_diff').value;
        renderList();
        closeModal();
        showDetail(t.name);
        fetch('/update_topic', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(t) }).catch(e=>console.warn);
      });
    };

    window.deleteTopic = async function(name) {
      if (!confirm(`Delete "${name}" permanently?`)) return;
      try {
        const r = await fetch('/delete_topic', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name}) });
        const data = await r.json();
        if (data.success) {
          state.topics = state.topics.filter(t => t.name !== name);
          state.selected.delete(name);
          renderList();
          if (state.active === name) {
            mainView.innerHTML = `<div class="empty-state"><i class="fas fa-compass"></i><h3>Topic removed</h3><p>Select another topic from the sidebar.</p></div>`;
            state.active = null;
          }
        } else alert('Failed to delete');
      } catch(e) { alert('Error'); }
    };

    // ---- MODALS ----
    function showModal(html) {
      modalRoot.style.display = 'flex';
      modalRoot.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this) closeModal()"><div class="modal-box">${html}</div></div>`;
    }
    function closeModal() { modalRoot.style.display = 'none'; modalRoot.innerHTML = ''; }
    window.closeModal = closeModal;

    window.openNewModal = function() {
      showModal(`
        <h3>New topic</h3>
        <div class="field"><label>Name</label><input id="m_name" placeholder="e.g. Dynamic Programming" /></div>
        <div class="field"><label>Category</label><input id="m_cat" placeholder="Algorithms" /></div>
        <div class="field"><label>Difficulty</label><select id="m_diff"><option value="easy">Easy</option><option value="medium" selected>Medium</option><option value="hard">Hard</option></select></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" id="modalSaveBtn">Add</button>
        </div>
      `);
      document.getElementById('modalSaveBtn').addEventListener('click', ()=>{
        const name = document.getElementById('m_name').value.trim();
        if (!name) return alert('Name required');
        addTopic({ name, category: document.getElementById('m_cat').value.trim()||'general', difficulty: document.getElementById('m_diff').value });
      });
    };

    function openSyncModal() {
      showModal(`
        <h3><i class="fab fa-github"></i> Sync from repo</h3>
        <div class="field"><label>Repository URL</label><input id="g_url" value="https://github.com/Aswin-Hariram/Leet-Code" /></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" id="scanBtn"><i class="fas fa-sync"></i> Scan</button>
        </div>
      `);
      document.getElementById('scanBtn').addEventListener('click', async ()=>{
        const repo = document.getElementById('g_url').value.trim();
        const btn = document.getElementById('scanBtn');
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> scanning...';
        try {
          const r = await fetch('/find_topic_gaps', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({repo_url: repo}) });
          const data = await r.json();
          const missing = data.missing_topics || [];
          closeModal();
          if (!missing.length) return alert('No missing topics.');
          showModal(`
            <h3>${missing.length} missing topics</h3>
            <div style="max-height:200px;overflow-y:auto;background:var(--surface);border-radius:12px;padding:0.75rem;margin-bottom:1rem;">
              ${missing.map(t => `<div style="padding:0.3rem 0;">• ${escape(t)}</div>`).join('')}
            </div>
            <div class="modal-actions">
              <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
              <button class="btn btn-primary" id="addMissingBtn">Add all</button>
            </div>
          `);
          document.getElementById('addMissingBtn').addEventListener('click', async ()=>{
            for (const name of missing) {
              state.topics.unshift({ name, category: 'github', difficulty: 'medium' });
            }
            renderList();
            closeModal();
            // bulk add to backend
            try {
              await fetch('/add_topics_bulk', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({topics: missing, category:'github', difficulty:'medium'}) });
            } catch(e) {}
            alert(`Added ${missing.length} topics`);
          });
        } catch(e) { alert('Scan failed'); btn.disabled=false; btn.innerHTML='<i class="fas fa-sync"></i> Scan'; }
      });
    }

    // ---- BULK ----
    function selectAll() {
      const q = qInput.value.trim().toLowerCase();
      state.topics.filter(t => t.name.toLowerCase().includes(q)).forEach(t => state.selected.add(t.name));
      renderList();
    }
    function clearSelection() { state.selected.clear(); renderList(); }

    async function bulkAddSelected() {
      const names = Array.from(state.selected);
      if (!names.length) return alert('Select topics');
      for (const name of names) {
        if (!state.topics.find(t => t.name === name)) {
          state.topics.unshift({ name, category: 'bulk', difficulty: 'medium' });
        }
      }
      renderList();
      state.selected.clear();
      try {
        await fetch('/add_topics_bulk', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({topics: names, category:'bulk', difficulty:'medium'}) });
      } catch(e) {}
      alert(`Added ${names.length} topics`);
    }

    async function bulkRemoveSelected() {
      const names = Array.from(state.selected);
      if (!names.length) return alert('Select topics');
      if (!confirm(`Remove ${names.length} topics?`)) return;
      let ok = 0;
      for (const name of names) {
        try {
          const r = await fetch('/delete_topic', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name}) });
          const d = await r.json();
          if (d.success) { state.topics = state.topics.filter(t => t.name !== name); ok++; }
        } catch(e) {}
      }
      state.selected.clear();
      renderList();
      alert(`Removed ${ok} topics`);
      if (state.active && !state.topics.find(t => t.name === state.active)) {
        mainView.innerHTML = `<div class="empty-state"><i class="fas fa-compass"></i><h3>Topic removed</h3><p>Select another topic.</p></div>`;
        state.active = null;
      }
    }

    // ---- EVENTS ----
    document.getElementById('newTopicBtn').addEventListener('click', ()=> openNewModal());
    document.getElementById('syncBtn').addEventListener('click', ()=> openSyncModal());
    document.getElementById('selectAllBtn').addEventListener('click', selectAll);
    document.getElementById('bulkClearBtn').addEventListener('click', clearSelection);
    document.getElementById('bulkAddBtn').addEventListener('click', bulkAddSelected);
    document.getElementById('bulkRemoveBtn').addEventListener('click', bulkRemoveSelected);
    qInput.addEventListener('input', renderList);

    // ---- INIT ----
    renderList();
    if (state.topics.length) showDetail(state.topics[0].name);
  })();
</script>
</body>
</html>
